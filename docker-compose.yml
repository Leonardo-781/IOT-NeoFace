services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  backend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      GENERATE_SYSTEM_CONFIG: "1"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-iot_monitoring}
      DB_USER: ${POSTGRES_USER:-iot_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass123}
      DB_SSL: "false"
      DB_RETENTION_DAYS: ${DB_RETENTION_DAYS:-30}
      BROKER_URL: tcp://mqtt:1883
      LOGIN_USER: ${LOGIN_USER:-admin}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-123456}
      PORT: ${BACKEND_PORT:-3000}
      SIMULATION_INTERVAL_MS: ${SIMULATION_INTERVAL_MS:-5000}
      COMMAND_ACK_DELAY_MS: ${COMMAND_ACK_DELAY_MS:-1200}
      MAX_TELEMETRY_POINTS: ${MAX_TELEMETRY_POINTS:-120}
    volumes:
      - backend-data:/app/data
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  gateway:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_URL: http://backend:3000
      PORT: ${GATEWAY_PORT:-3001}
    ports:
      - "${GATEWAY_PORT:-3001}:3001"

  ingest:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      BROKER_URL: tcp://mqtt:1883
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-iot_monitoring}
      DB_USER: ${POSTGRES_USER:-iot_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass123}
      DB_SSL: "false"
      INGEST_HTTP_PORT: ${INGEST_HTTP_PORT:-3102}
    ports:
      - "${INGEST_HTTP_PORT:-3102}:3102"

volumes:
  pgdata:
  backend-data:
  mosquitto-data:
  mosquitto-log: