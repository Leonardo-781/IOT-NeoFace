version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    container_name: tf-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tf-network

  mqtt:
    image: eclipse-mosquitto:2-alpine
    restart: always
    container_name: tf-mqtt
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "127.0.0.1", "-t", "$SYS/broker/uptime"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - tf-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: tf-backend
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-iot_monitoring}
      DB_USER: ${POSTGRES_USER:-iot_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass123}
      DB_SSL: "false"
      BROKER_URL: tcp://mqtt:1883
      LOGIN_USER: ${LOGIN_USER:-admin}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-123456}
      GENERATE_SYSTEM_CONFIG: "1"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - backend-logs:/app/logs
    networks:
      - tf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: tf-gateway
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3000
      PORT: 3001
    ports:
      - "${GATEWAY_PORT:-3001}:3001"
    volumes:
      - gateway-logs:/app/logs
    networks:
      - tf-network
    command: node api-server.js
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: tf-ingest
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    environment:
      NODE_ENV: production
      INGEST_HTTP_PORT: 3102
      BROKER_URL: tcp://mqtt:1883
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-iot_monitoring}
      DB_USER: ${POSTGRES_USER:-iot_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-iot_pass123}
      DB_SSL: "false"
    ports:
      - "${INGEST_HTTP_PORT:-3102}:3102"
    volumes:
      - ingest-logs:/app/logs
    networks:
      - tf-network
    command: node ingest-service.js
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3102/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  mqtt-data:
  mqtt-logs:
  backend-logs:
  gateway-logs:
  ingest-logs:

networks:
  tf-network:
    driver: bridge
